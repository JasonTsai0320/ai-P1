<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt 智能寶庫</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts：襯線標題字 + 無襯線內文字 + 等寬編號字 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #11131a;
            --ink-panel: #1a1d27;
            --ink-panel-2: #21252f;
            --ink-panel-3: #262b36;
            --gold: #c9a464;
            --gold-bright: #e3c07f;
            --gold-dim: rgba(201, 164, 100, 0.18);
            --cream: #ece7da;
            --muted: #8b8f9c;
            --hairline: rgba(201, 164, 100, 0.16);
            --success: #7a9b76;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--ink);
            background-image:
                radial-gradient(ellipse 900px 500px at 50% -10%, rgba(201, 164, 100, 0.10), transparent 60%),
                radial-gradient(ellipse 700px 400px at 100% 10%, rgba(139, 111, 168, 0.06), transparent 60%);
            background-repeat: no-repeat;
        }

        .font-display {
            font-family: 'Noto Serif TC', serif;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* 自訂滾動條：深墨底 + 古銅金把手 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(201, 164, 100, 0.35);
            border-radius: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(201, 164, 100, 0.6);
        }

        /* 卡片頂部細線裝飾 */
        .vault-card {
            position: relative;
        }
        .vault-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--card-accent, var(--gold)), transparent);
        }

        /* 票根式虛線裁切裝飾，搭配左右打孔圓點 */
        .ticket-divider {
            position: relative;
            border-top: 1.5px dashed rgba(255,255,255,0.12);
            margin: 0 -1.75rem;
        }
        .ticket-divider::before,
        .ticket-divider::after {
            content: '';
            position: absolute;
            top: -8px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--ink-panel);
        }
        .ticket-divider::before { left: -8px; }
        .ticket-divider::after { right: -8px; }

        .category-btn.active {
            box-shadow: 0 0 0 1px var(--gold), 0 4px 14px rgba(201, 164, 100, 0.15);
        }

        ::selection {
            background: var(--gold);
            color: #14171f;
        }

        .hairline {
            border-color: var(--hairline);
        }
    </style>
</head>
<body class="min-h-screen text-[var(--cream)] antialiased">

    <!-- 頂部導航 / 標題區 -->
    <header class="py-16 px-4 max-w-[1400px] mx-auto text-center">
        <div class="flex flex-col items-center justify-center space-y-5">
            <span class="font-mono text-[11px] tracking-[0.4em] text-[var(--gold)] uppercase">AI Prompt Archive</span>
            <h1 class="font-display text-4xl md:text-5xl font-black text-[var(--cream)] tracking-wide">
                AI Prompt <span class="text-[var(--gold-bright)]">智能寶庫</span>
            </h1>
            <p class="text-sm text-[var(--muted)] max-w-md">精選課程與寫作現場淬鍊出的提示詞，分類收藏、隨取隨用</p>

            <!-- 原始資料連結 -->
            <a href="https://docs.google.com/spreadsheets/d/1BgdpZOWgDhMF-1VL2lfDkq4OcOnk3YhOdt-0-6PsAj0/edit?gid=2013526827#gid=2013526827"
               target="_blank"
               class="inline-flex items-center gap-2 text-sm text-[var(--gold-bright)] hover:text-[var(--cream)] hover:border-[var(--gold)] transition-all bg-[var(--ink-panel)] px-5 py-2.5 rounded-full shadow-sm border border-[var(--hairline)] font-medium">
                <i class="fa-regular fa-file-excel text-[var(--gold)] text-base"></i>
                開啟原始資料 Google Sheet
            </a>
        </div>

        <!-- 搜尋欄 -->
        <div class="mt-10 max-w-xl mx-auto relative px-4">
            <span class="absolute inset-y-0 left-8 flex items-center pointer-events-none text-[var(--muted)]">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
            <input type="text" id="searchInput" placeholder="搜尋提示詞..."
                   class="w-full pl-12 pr-5 py-3.5 bg-[var(--ink-panel)] border border-[var(--hairline)] rounded-full shadow-sm focus:outline-none focus:ring-2 focus:ring-[var(--gold)] focus:border-[var(--gold)] text-[var(--cream)] placeholder-[var(--muted)] transition-all text-base">
        </div>

        <!-- 分類過濾按鈕區 -->
        <div class="mt-8 max-w-5xl mx-auto px-4">
            <div id="categoryContainer" class="flex flex-wrap justify-center gap-2.5">
                <!-- 動態插入分類按鈕 -->
                <button onclick="filterCategory('全部')" id="btn-all" class="category-btn active px-4 py-1.5 rounded-full text-sm font-medium transition-all shadow-sm border bg-[var(--gold)] text-[#14171f] border-[var(--gold)]">
                    全部
                </button>
            </div>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="max-w-[1400px] mx-auto px-6 pb-24">
        <!-- 區塊小標：AI 協思 -->
        <div class="flex items-center gap-3 mb-8 border-b border-[var(--hairline)] pb-4">
            <span class="w-1.5 h-5 bg-[var(--gold)] rounded-sm"></span>
            <h2 class="font-display text-xl font-bold text-[var(--cream)] tracking-wide">AI 協思</h2>
            <span id="dataStatus" class="ml-auto text-xs px-3 py-1.5 bg-[var(--ink-panel)] text-[var(--gold-bright)] border border-[var(--hairline)] rounded-full font-medium flex items-center gap-1.5">
                <i class="fa-solid fa-spinner animate-spin"></i> 正在載入雲端資料...
            </span>
        </div>

        <!-- 卡片網格 -->
        <div id="promptGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- 骨架屏 / Loading Placeholders -->
            <div class="animate-pulse bg-[var(--ink-panel)] rounded-2xl p-7 border border-[var(--hairline)] h-[480px] flex flex-col justify-between">
                <div class="space-y-4">
                    <div class="h-6 bg-[var(--ink-panel-3)] rounded w-1/4"></div>
                    <div class="h-8 bg-[var(--ink-panel-3)] rounded w-3/4"></div>
                    <div class="h-64 bg-[var(--ink-panel-2)] rounded"></div>
                </div>
                <div class="h-11 bg-[var(--ink-panel-3)] rounded"></div>
            </div>
            <div class="animate-pulse bg-[var(--ink-panel)] rounded-2xl p-7 border border-[var(--hairline)] h-[480px] flex flex-col justify-between hidden md:flex">
                <div class="space-y-4">
                    <div class="h-6 bg-[var(--ink-panel-3)] rounded w-1/4"></div>
                    <div class="h-8 bg-[var(--ink-panel-3)] rounded w-3/4"></div>
                    <div class="h-64 bg-[var(--ink-panel-2)] rounded"></div>
                </div>
                <div class="h-11 bg-[var(--ink-panel-3)] rounded"></div>
            </div>
            <div class="animate-pulse bg-[var(--ink-panel)] rounded-2xl p-7 border border-[var(--hairline)] h-[480px] flex flex-col justify-between hidden lg:flex">
                <div class="space-y-4">
                    <div class="h-6 bg-[var(--ink-panel-3)] rounded w-1/4"></div>
                    <div class="h-8 bg-[var(--ink-panel-3)] rounded w-3/4"></div>
                    <div class="h-64 bg-[var(--ink-panel-2)] rounded"></div>
                </div>
                <div class="h-11 bg-[var(--ink-panel-3)] rounded"></div>
            </div>
            <div class="animate-pulse bg-[var(--ink-panel)] rounded-2xl p-7 border border-[var(--hairline)] h-[480px] flex flex-col justify-between hidden xl:flex">
                <div class="space-y-4">
                    <div class="h-6 bg-[var(--ink-panel-3)] rounded w-1/4"></div>
                    <div class="h-8 bg-[var(--ink-panel-3)] rounded w-3/4"></div>
                    <div class="h-64 bg-[var(--ink-panel-2)] rounded"></div>
                </div>
                <div class="h-11 bg-[var(--ink-panel-3)] rounded"></div>
            </div>
        </div>

        <!-- 查無結果提示 -->
        <div id="noResults" class="hidden text-center py-24">
            <span class="text-4xl text-[var(--gold)]"><i class="fa-solid fa-magnifying-glass"></i></span>
            <h3 class="font-display text-lg font-bold text-[var(--cream)] mt-4">找不到符合關鍵字的 Prompt</h3>
            <p class="text-[var(--muted)] text-sm mt-1">請嘗試輸入其他關鍵字或切換分類</p>
        </div>
    </main>

    <!-- 全域 Toast 提示訊息 -->
    <div id="toast" class="fixed bottom-8 right-8 z-50 transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        <div class="bg-[var(--ink-panel)] text-[var(--cream)] px-5 py-3.5 rounded-xl shadow-2xl flex items-center gap-3 font-medium border border-[var(--gold)]/40">
            <span class="text-[var(--gold-bright)] text-lg"><i class="fa-solid fa-circle-check"></i></span>
            <span id="toastMsg">複製成功！</span>
        </div>
    </div>

    <script>
        // 設定與 Google Sheet 連結
        const SPREADSHEET_ID = '1BgdpZOWgDhMF-1VL2lfDkq4OcOnk3YhOdt-0-6PsAj0';
        const GID = '2013526827';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${GID}`;

        // 預設/備用資料（當 Sheet 無法存取時，100% 確保頁面完整美觀）
        const fallbackData = [
            {
                category: "內容創作",
                title: "意義單詞",
                prompt: "將文章的重點部分，尋找一個代表性英文字母，並使這些字母的首字組合成一個具有意義的單詞（如「VISION」）。"
            },
            {
                category: "內容創作",
                title: "品牌名稱",
                prompt: "完成 ChatGPT 角色定義後，依據「品牌定義」與「產品介紹」發想5個產品名稱與標題（口號）。\n- 提示詞指令：描述品牌與產品，請列出 數字 個產品名稱與行銷標題建議。(*「品牌定義」描述、「產品介紹」描述)\n- Prompt\n- 我推出一個運動鞋品牌，今年會銷售一款新型跑步鞋。"
            },
            {
                category: "筆記精煉",
                title: "長編文章",
                prompt: "為這一篇長篇文章，進行以下四個步驟，每一個步驟都要提供給文章與標示出來：\n第1、請為這篇長文件生成一份簡短摘要。\n第2、請基於上一個摘要，不要遺漏任何專有名詞、數字或關鍵人物，重新生成一份摘要。\n第3、現在，請將摘要中每一句話都濃縮成更簡潔的表達，同時保留核心意義。"
            },
            {
                category: "筆記精煉",
                title: "書籍精煉",
                prompt: "請對 @[檔名]\n啟動【終極煉金管線】，一次執行四步驟整合：\n第一步：全域架構導航 (Stage 01)\n執行 stage-1-navigator，對精煉稿進行深度掃描，產出知識地圖與反直覺預警。\n存檔：01_Map_[主題簡稱].md。\n第二步：價值 DNA 診斷 (Stage 02)"
            },
            {
                category: "筆記精煉",
                title: "書籍精煉",
                prompt: "對上文提及之書籍，針對其核心商業模式與實踐步驟進行深度骨架提取。請梳理出作者最重要的 3 個觀點、實作方法以及讀者能立即套用的行動方針，並將之格式化為便於閱讀的 Markdown 筆記。"
            },
            {
                category: "筆記精煉",
                title: "提取練習",
                prompt: "我剛讀完了關於 [填入具體段落標題] 的內容。現在請幫我進行深度研磨：\n\n1-底層邏輯拷問：針對這段內容的「運作原理」向我提問，測試我是否理解了「為什麼有效」，而非只是記住步驟。\n\n2-環境轉化：如果這段概念在極端情況下使用..."
            },
            {
                category: "內容創作",
                title: "影片清理",
                prompt: "你的角色是一位「逐字稿校對員」，不是編輯。\n任務：\n1-僅刪除口語填充詞、重複說法、明顯冗詞\n2-不得改寫句型、不得改變原意、不得加入新解釋\n規則：\n1-原句順序必須完全一致\n2-若清除任何口誤，需確保語氣前後連貫一致。"
            },
            {
                category: "內容創作",
                title: "影片清理",
                prompt: "你的角色是一位「內容結構化整理員」，不是編輯、不是評論者。\n\n我會提供一段約 4000 字的影片文字內容，請你在完全保留原作者語意與立場的前提下，\n進行「保留語意的濃縮」，將內容壓縮至 約 2000 字。全文用繁體中文呈現。"
            },
            {
                category: "程式應用",
                title: "程式重構專家",
                prompt: "你是一位資深的軟體架構師。請分析以下程式碼，並給出重構建議：\n1. 找出潛在的效能瓶頸或安全漏洞。\n2. 改進程式碼的可讀性、可維護性與簡潔度。\n3. 使用現代最佳實踐重寫該段程式碼，並加上詳細的繁體中文註解說明優化之處。"
            },
            {
                category: "簡報表達",
                title: "簡報大綱擬定",
                prompt: "請為一個主題為「人工智慧在日常工作中的落地應用」的 30 分鐘簡報，擬定一份結構完整且吸引人的簡報大綱。包含：\n1. 投影片頁數規劃（建議 10-12 頁）。\n2. 每頁投影片的核心論點與關鍵字。\n3. 聽眾互動與轉場點的設計建議。"
            }
        ];

        // 分類對應色彩（低飽和寶石色調，於深色底上呈現質感）
        const categoryColors = {
            "內容創作": "#c17767",
            "筆記精煉": "#8b6fa8",
            "程式應用": "#4f9d95",
            "簡報表達": "#c9a227",
            "程式生成": "#6b7cb8",
            "文本優化": "#a8546a",
            "生文校正": "#5f9b78",
            "專案企劃": "#b8863f",
            "圖片生成": "#c17a9e",
            "筆記整理": "#8f7eb3",
            "資訊整理": "#5e88a3",
            "心智圖法": "#b6693f",
            "預設": "#7a7f8c"
        };

        function getCategoryColor(cat) {
            return categoryColors[cat] || categoryColors["預設"];
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        let allPrompts = [];
        let currentCategory = "全部";

        // CSV 解析函數，支援換行符與引號
        function parseCSV(text) {
            let lines = [];
            let row = [""];
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                let next = text[i+1];
                if (c === '"') {
                    if (inQuotes && next === '"') {
                        row[row.length - 1] += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (c === ',' && !inQuotes) {
                    row.push('');
                } else if ((c === '\r' || c === '\n') && !inQuotes) {
                    if (c === '\r' && next === '\n') { i++; }
                    lines.push(row);
                    row = [''];
                } else {
                    row[row.length - 1] += c;
                }
            }
            if (row.length > 1 || row[0] !== '') {
                lines.push(row);
            }
            return lines;
        }

        // 初始化：獲取雲端資料
        async function fetchSheetData() {
            const dataStatus = document.getElementById('dataStatus');
            try {
                // 超時控制 (6秒)
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 6000);

                const response = await fetch(CSV_URL, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!response.ok) throw new Error('Network response was not ok');
                const rawText = await response.text();

                const csvData = parseCSV(rawText);
                if (csvData.length <= 1) {
                    throw new Error('CSV is empty or invalid format');
                }

                // 尋找表頭索引，防錯
                const header = csvData[0].map(h => h.trim());
                let categoryIdx = header.findIndex(h => h.includes('分類'));
                let titleIdx = header.findIndex(h => h.includes('名稱') || h.includes('標題'));
                let promptIdx = header.findIndex(h => h.includes('內容') || h.includes('提示詞'));

                // 降級處理索引
                if (categoryIdx === -1) categoryIdx = 0;
                if (titleIdx === -1) titleIdx = 1;
                if (promptIdx === -1) promptIdx = 2;

                allPrompts = [];
                for (let i = 1; i < csvData.length; i++) {
                    const row = csvData[i];
                    if (row.length > Math.max(categoryIdx, titleIdx, promptIdx) && row[promptIdx].trim() !== '') {
                        allPrompts.push({
                            category: row[categoryIdx]?.trim() || "未分類",
                            title: row[titleIdx]?.trim() || "未命名 Prompt",
                            prompt: row[promptIdx]?.trim() || ""
                        });
                    }
                }

                if (allPrompts.length === 0) {
                    throw new Error('No valid rows found');
                }

                dataStatus.innerHTML = `<i class="fa-solid fa-circle-check text-[var(--gold-bright)]"></i> 已連線 Google 試算表`;
            } catch (error) {
                console.warn('雲端載入失敗，已切換至本機快照資料庫：', error);
                allPrompts = fallbackData;
                dataStatus.innerHTML = `<i class="fa-solid fa-box-archive text-[var(--gold)]"></i> 本機典藏快照模式`;
            }

            renderCategories();
            renderCards();
        }

        // 動態生成分類按鈕
        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            const categories = ["全部", ...new Set(allPrompts.map(item => item.category))];

            container.innerHTML = '';
            categories.forEach(cat => {
                const isActive = cat === currentCategory;
                const color = cat === "全部" ? "#c9a464" : getCategoryColor(cat);
                const btn = document.createElement('button');
                btn.onclick = () => filterCategory(cat);
                btn.className = `category-btn px-4.5 py-1.5 rounded-full text-sm font-medium transition-all shadow-sm border`;
                if (isActive) {
                    btn.classList.add('active');
                    btn.style.backgroundColor = color;
                    btn.style.color = '#14171f';
                    btn.style.borderColor = color;
                } else {
                    btn.style.backgroundColor = 'var(--ink-panel)';
                    btn.style.color = 'var(--muted)';
                    btn.style.borderColor = 'var(--hairline)';
                }
                btn.innerText = cat;
                container.appendChild(btn);
            });
        }

        // 依據篩選與搜尋，生成 Prompt 卡片
        function renderCards() {
            const grid = document.getElementById('promptGrid');
            const noResults = document.getElementById('noResults');
            const searchKeyword = document.getElementById('searchInput').value.toLowerCase().trim();

            const filtered = allPrompts.filter(item => {
                const matchesCategory = currentCategory === "全部" || item.category === currentCategory;
                const matchesSearch = item.title.toLowerCase().includes(searchKeyword) ||
                                      item.prompt.toLowerCase().includes(searchKeyword) ||
                                      item.category.toLowerCase().includes(searchKeyword);
                return matchesCategory && matchesSearch;
            });

            grid.innerHTML = '';

            if (filtered.length === 0) {
                noResults.classList.remove('hidden');
                grid.classList.add('hidden');
                return;
            }

            noResults.classList.add('hidden');
            grid.classList.remove('hidden');

            filtered.forEach((item, index) => {
                const color = getCategoryColor(item.category);
                const serial = String(index + 1).padStart(3, '0');

                const card = document.createElement('div');
                card.className = "vault-card bg-[var(--ink-panel)] rounded-2xl p-7 shadow-lg shadow-black/20 hover:shadow-xl hover:shadow-black/30 hover:-translate-y-0.5 transition-all duration-300 flex flex-col justify-between h-[480px] group border border-[var(--hairline)]";
                card.style.setProperty('--card-accent', color);

                card.innerHTML = `
                    <div class="flex flex-col h-[calc(100%-58px)]">
                        <!-- 分類標籤 + 編號 -->
                        <div class="flex items-center justify-between mb-3.5">
                            <span class="inline-block px-3 py-1 text-xs font-bold rounded-md border"
                                  style="color:${color}; background:${hexToRgba(color, 0.12)}; border-color:${hexToRgba(color, 0.35)};">
                                ${item.category}
                            </span>
                            <span class="font-mono text-[11px] tracking-wider text-[var(--muted)]">NO.${serial}</span>
                        </div>
                        <!-- 卡片標題 -->
                        <h3 class="font-display text-xl font-bold text-[var(--cream)] mb-4 line-clamp-1 transition-colors" style="color: var(--cream)">
                            ${item.title}
                        </h3>
                        <!-- 內容捲動區 -->
                        <div class="flex-grow bg-[var(--ink-panel-2)] border border-[var(--hairline)] rounded-xl p-4.5 overflow-y-auto text-[14px] text-[var(--muted)] leading-relaxed custom-scrollbar whitespace-pre-wrap select-all">
                            ${escapeHTML(item.prompt)}
                        </div>
                    </div>
                    <!-- 票根式虛線分隔 -->
                    <div class="ticket-divider"></div>
                    <!-- 複製按鈕 -->
                    <div class="pt-4">
                        <button onclick="copyPrompt(this, \`${escapeJsString(item.prompt)}\`)"
                                class="w-full py-3 rounded-lg font-bold text-sm tracking-wide transition-all active:scale-[0.98] flex items-center justify-center gap-2 border"
                                style="background:${hexToRgba(color, 0.12)}; color:${color}; border-color:${hexToRgba(color, 0.4)};"
                                onmouseover="this.style.background='${color}'; this.style.color='#14171f';"
                                onmouseout="this.style.background='${hexToRgba(color, 0.12)}'; this.style.color='${color}';">
                            <i class="fa-regular fa-copy"></i> 複製 Prompt
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // HTML 安全逸出
        function escapeHTML(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 逸出 JavaScript 字串以防按鈕 onclick 語法出錯
        function escapeJsString(str) {
            return str
                .replace(/\\/g, '\\\\')
                .replace(/`/g, '\\`')
                .replace(/\$/g, '\\$')
                .replace(/"/g, '\\"');
        }

        // 複製 Prompt 功能
        function copyPrompt(button, text) {
            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = text;
            tempTextArea.style.position = "fixed";
            tempTextArea.style.left = "-99999px";
            document.body.appendChild(tempTextArea);

            tempTextArea.select();
            tempTextArea.setSelectionRange(0, 99999);

            let successful = false;
            try {
                successful = document.execCommand("copy");
            } catch (err) {
                console.error("複製失敗：", err);
            }

            document.body.removeChild(tempTextArea);

            if (successful) {
                const originalContent = button.innerHTML;
                const originalBg = button.style.background;
                const originalColor = button.style.color;
                const originalBorder = button.style.borderColor;

                button.innerHTML = `<i class="fa-solid fa-check"></i> 已複製！`;
                button.style.background = 'rgba(122, 155, 118, 0.15)';
                button.style.color = '#9ec49a';
                button.style.borderColor = 'rgba(122, 155, 118, 0.4)';

                showToast("Prompt 已順利複製至剪貼簿！");

                setTimeout(() => {
                    button.innerHTML = originalContent;
                    button.style.background = originalBg;
                    button.style.color = originalColor;
                    button.style.borderColor = originalBorder;
                }, 1500);
            } else {
                showToast("複製失敗，請手動選取複製");
            }
        }

        // 顯示 Toast 訊息
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.innerText = message;

            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 2500);
        }

        // 分類點擊篩選
        function filterCategory(cat) {
            currentCategory = cat;
            renderCategories();
            renderCards();
        }

        // 搜尋欄鍵盤事件
        document.getElementById('searchInput').addEventListener('input', () => {
            renderCards();
        });

        // 網頁載入時啟動
        window.addEventListener('DOMContentLoaded', () => {
            fetchSheetData();
        });
    </script>
</body>
</html>
